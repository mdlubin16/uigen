name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read # Required for Claude to read CI results on PRs
      id-token: write # Required for OIDC token exchange
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
  - Name: Project setup
    run: 
      npm run setup
      npm run dev: daemon

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Optional: customize the trigger phrase (default: @claude)
          # trigger_phrase: "/claude"
          # Optional: pass arguments to Claude (model, turn limits, allowed tools, etc.)
          # claude_args: "--model claude-opus-4-8"
      Custom_instructions:
        The project is already set up with the necessary dependencies installed.
        The server is already running at localhost:3000. Logs from it are being written to logs.txt. If needed, you can
        query the db with the 'sqlite3' cli. If needed use the mcp_playwright set of tools to launch a a browser and
        interact with the app.
        